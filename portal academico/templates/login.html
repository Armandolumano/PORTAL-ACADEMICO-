<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Portal Académico — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e, #1565c0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .card-header-login {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            border-radius: 16px 16px 0 0 !important;
            padding: 30px;
            text-align: center;
        }
        .card-header-login h4 {
            color: white;
            margin: 0;
            font-weight: 700;
            font-size: 22px;
        }
        .card-header-login p {
            color: rgba(255,255,255,0.8);
            margin: 5px 0 0;
            font-size: 13px;
        }
        .icon-escola {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
        }
        .form-control:focus {
            border-color: #1565c0;
            box-shadow: 0 0 0 0.2rem rgba(21,101,192,0.25);
        }
        .btn-entrar {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
        }
        .btn-entrar:hover {
            background: linear-gradient(135deg, #0d47a1, #1a237e);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
    </style>
</head>
<body>
    <div class="card card-login">
        <div class="card-header-login">
            <div class="icon-escola">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h4>Portal Académico</h4>
            <p>Universidade Kimpa Vita</p>
        </div>

        <div class="card-body p-4">

            {% if erro %}
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    {{ erro }}
                </div>
                {% endif %}

                {% if tempo_restante %}
                <div class="alert alert-warning text-center" role="alert" id="alerta-bloqueio">
                    <i class="bi bi-clock me-2"></i>
                    Demasiadas tentativas. Aguarda <strong><span id="contador">{{ tempo_restante }}</span></strong> segundos.
                </div>
                <script>
                    var contador = {{ tempo_restante }};
                    var intervalo = setInterval(function() {
                        contador--;
                        document.getElementById('contador').textContent = contador;
                        if (contador <= 0) {
                            clearInterval(intervalo);
                            document.getElementById('alerta-bloqueio').style.display = 'none';
                        }
                    }, 1000);
                </script>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill text-primary"></i>
                        </span>
                        <input 
                            type="text" 
                            name="nome" 
                            class="form-control" 
                            placeholder="Insere o teu username"
                            required
                        />
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill text-primary"></i>
                        </span>
                        <input 
                            type="password" 
                            name="senha" 
                            class="form-control" 
                            placeholder="Insere a tua senha"
                            required
                        />
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-entrar w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>

        </div>

        <div class="card-footer text-center text-muted py-3" style="border-radius: 0 0 16px 16px;">
            <small><i class="bi bi-shield-lock me-1"></i>Sistema seguro — acesso restrito</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
